<body>
	<div id="form">
		<table border="1">
			<tr>
				<td style="padding: 15px;" valign="top">
					<table border="0">
						<tr><td>Monat:</td></tr>

							<option value="0" style="color: gray;">...</option>

							<option value="8">Aug</option>
							<option value="9">Sep</option>
							<option value="10">Okt</option>
							<option value="11">Nov</option>
							<option value="12">Dez</option>
						</select> 
						</td></tr>
					</table>
				</td>
				<td style="padding: 15px;" valign="top">
					<table border="0">
						<tr><td>Kosten:</td></tr>
						<tr><td style="padding-left: 10px;">20m: <input type="text" id="k20" name="k20" class="kost-input" />&#8364;</td></tr>
						<tr><td style="padding-left: 10px;">30m: <input type="text" id="k30" name="k30" class="kost-input" />&#8364;</td></tr>
						<tr><td style="padding-left: 10px;">45m: <input type="text" id="k45" name="k45" class="kost-input" />&#8364;</td></tr>
						<tr><td style="padding-left: 10px;">60m: <input type="text" id="k60" name="k60" class="kost-input" />&#8364;</td></tr>
					</table>
				</td>
				<td style="padding: 15px;" valign="top">
					<table border="0">
						<tr><td>Anzahl:</td></tr>
						<tr><td style="padding-left: 10px;"><input type="number" id="a20" name="t20" class="kost-input" /> x 20m</td></tr>
						<tr><td style="padding-left: 10px;"><input type="number" id="a30" name="t30" class="kost-input" /> x 30m</td></tr>
						<tr><td style="padding-left: 10px;"><input type="number" id="a45" name="t45" class="kost-input" /> x 45m</td></tr>
						<tr><td style="padding-left: 10px;"><input type="number" id="a60" name="t60" class="kost-input" /> x 60m</td></tr>
					</table>
				</td>
				<td style="padding: 15px;" valign="top">

					</table>
				</td>
				<td style="padding: 15px;" valign="bottom">
					<table border="0">
						<tr><td><input type="button" id="bCalc" value="Berechnen" class="button" /></td></tr>
					</table>
				</td>
			</tr>
